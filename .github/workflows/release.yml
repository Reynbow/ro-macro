name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync VERSION from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+)$') {
            $v = $Matches[1]
            Set-Content -LiteralPath "VERSION" -Value $v -NoNewline
            Write-Host "VERSION set to $v from tag $ref"
          } else {
            Write-Error "Tag must be vX.Y.Z (semver). Got: $ref"
            exit 1
          }

      - name: Install AutoHotkey v2 (portable zip)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # Pinned URLs: autohotkey.com is Cloudflare-blocked on Actions; GitHub API hits unauthenticated rate limits.
          $ahkTag = "v2.0.26"
          $ahkVer = "2.0.26"
          $zipUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/$ahkTag/AutoHotkey_$ahkVer.zip"
          $zipPath = "$env:RUNNER_TEMP\AutoHotkey.zip"
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath
          $dest = "$env:RUNNER_TEMP\AutoHotkey"
          if (Test-Path -LiteralPath $dest) { Remove-Item -LiteralPath $dest -Recurse -Force }
          New-Item -ItemType Directory -Path $dest | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath $dest
          $ahk2 = Get-ChildItem -LiteralPath $dest -Recurse -Filter Ahk2Exe.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ahk2) { throw "Ahk2Exe.exe not found in portable zip (layout changed?)." }
          $compilerDir = $ahk2.Directory.FullName
          $ahkRoot = (Get-Item -LiteralPath $compilerDir).Parent.FullName
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $compilerDir
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $ahkRoot
          Write-Host "Ahk2Exe: $($ahk2.FullName)"

      - name: Build release zip
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\scripts\build-release.ps1"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
