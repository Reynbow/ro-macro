name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync VERSION from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+)$') {
            $v = $Matches[1]
            Set-Content -LiteralPath "VERSION" -Value $v -NoNewline
            Write-Host "VERSION set to $v from tag $ref"
          } else {
            Write-Error "Tag must be vX.Y.Z (semver). Got: $ref"
            exit 1
          }

      - name: Install AutoHotkey v2 (portable zip from GitHub)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # 1) autohotkey.com is often Cloudflare-blocked on Actions.
          # 2) Silent setup.exe may not leave Ahk2Exe where our script searches on hosted runners.
          # Portable .zip from GitHub releases is reliable and includes Compiler\Ahk2Exe.exe.
          $api = "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest"
          $rel = Invoke-RestMethod -Uri $api -Headers @{ "User-Agent" = "RO-Macro-Release-CI" }
          $zip = $rel.assets | Where-Object { $_.name -match '^AutoHotkey_2\.\d+\.\d+\.zip$' } | Select-Object -First 1
          if (-not $zip) {
            $zip = $rel.assets | Where-Object { $_.name -like 'AutoHotkey_*.zip' } | Select-Object -First 1
          }
          if (-not $zip) { throw "No portable .zip in AutoHotkey release $($rel.tag_name)" }
          $zipPath = "$env:RUNNER_TEMP\AutoHotkey.zip"
          Invoke-WebRequest -Uri $zip.browser_download_url -OutFile $zipPath
          $dest = "$env:RUNNER_TEMP\AutoHotkey"
          if (Test-Path -LiteralPath $dest) { Remove-Item -LiteralPath $dest -Recurse -Force }
          New-Item -ItemType Directory -Path $dest | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath $dest
          $ahk2 = Get-ChildItem -LiteralPath $dest -Recurse -Filter Ahk2Exe.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ahk2) { throw "Ahk2Exe.exe not found inside $($zip.name)" }
          $compilerDir = $ahk2.Directory.FullName
          $ahkRoot = (Get-Item -LiteralPath $compilerDir).Parent.FullName
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $compilerDir
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $ahkRoot
          Write-Host "Ahk2Exe: $($ahk2.FullName)"

      - name: Build release zip
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\scripts\build-release.ps1"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
