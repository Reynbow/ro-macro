name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync VERSION from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+)$') {
            $v = $Matches[1]
            Set-Content -LiteralPath "VERSION" -Value $v -NoNewline
            Write-Host "VERSION set to $v from tag $ref"
          } else {
            Write-Error "Tag must be vX.Y.Z (semver). Got: $ref"
            exit 1
          }

      - name: Install AutoHotkey v2 (winget)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # winget installs a predictable layout with Compiler\Ahk2Exe.exe on windows-latest.
          # (Direct setup.exe from GitHub was silent but did not surface Ahk2Exe in time for our search paths.)
          winget install --id AutoHotkey.AutoHotkey -e --version 2.0.26 --silent --accept-package-agreements --accept-source-agreements
          Start-Sleep -Seconds 15
          $roots = @(
            "${env:ProgramW6432}\AutoHotkey",
            "${env:ProgramFiles}\AutoHotkey",
            "${env:ProgramFiles(x86)}\AutoHotkey",
            "${env:LocalAppData}\Programs\AutoHotkey"
          )
          $ahk2 = $null
          foreach ($root in $roots) {
            if (Test-Path -LiteralPath $root) {
              $ahk2 = Get-ChildItem -LiteralPath $root -Recurse -Filter Ahk2Exe.exe -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($ahk2) { break }
            }
          }
          if (-not $ahk2) {
            $ahk2 = Get-ChildItem -Path "$env:LocalAppData\Programs" -Recurse -Filter Ahk2Exe.exe -ErrorAction SilentlyContinue |
              Select-Object -First 1
          }
          if (-not $ahk2) { throw "Ahk2Exe.exe not found after winget install." }
          $compilerDir = $ahk2.Directory.FullName
          $ahkRoot = (Get-Item -LiteralPath $compilerDir).Parent.FullName
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $compilerDir
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $ahkRoot
          Write-Host "Ahk2Exe: $($ahk2.FullName)"

      - name: Build release zip
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\scripts\build-release.ps1"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
