name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync VERSION from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          if ($ref -match '^v(\d+\.\d+\.\d+)$') {
            $v = $Matches[1]
            Set-Content -LiteralPath "VERSION" -Value $v -NoNewline
            Write-Host "VERSION set to $v from tag $ref"
          } else {
            Write-Error "Tag must be vX.Y.Z (semver). Got: $ref"
            exit 1
          }

      - name: Install AutoHotkey v2 (setup from GitHub release)
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          # Pinned installer: avoids Cloudflare on autohotkey.com and GitHub API rate limits.
          # Official portable .zip does not include Ahk2Exe; setup.exe does.
          $ahkTag = "v2.0.26"
          $ahkVer = "2.0.26"
          $setupUrl = "https://github.com/AutoHotkey/AutoHotkey/releases/download/$ahkTag/AutoHotkey_${ahkVer}_setup.exe"
          $setup = "$env:RUNNER_TEMP\AutoHotkey_setup.exe"
          Invoke-WebRequest -Uri $setupUrl -OutFile $setup
          Start-Process -FilePath $setup -ArgumentList "/silent" -Wait
          Start-Sleep -Seconds 12
          $roots = @(
            "${env:ProgramFiles}\AutoHotkey",
            "${env:ProgramFiles(x86)}\AutoHotkey",
            "${env:LocalAppData}\Programs\AutoHotkey"
          )
          $ahk2 = $roots | ForEach-Object {
            if (Test-Path $_) {
              Get-ChildItem -Path $_ -Recurse -Filter Ahk2Exe.exe -ErrorAction SilentlyContinue | Select-Object -First 1
            }
          } | Where-Object { $_ } | Select-Object -First 1
          if (-not $ahk2) {
            $ahk2 = Get-ChildItem -Path "$env:LocalAppData\Programs" -Recurse -Filter Ahk2Exe.exe -ErrorAction SilentlyContinue |
              Select-Object -First 1
          }
          if (-not $ahk2) { throw "Ahk2Exe.exe not found after silent install." }
          $compilerDir = $ahk2.Directory.FullName
          $ahkRoot = (Get-Item -LiteralPath $compilerDir).Parent.FullName
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $compilerDir
          Add-Content -LiteralPath $env:GITHUB_PATH -Value $ahkRoot
          Write-Host "Ahk2Exe: $($ahk2.FullName)"

      - name: Build release zip
        shell: pwsh
        run: |
          & "$env:GITHUB_WORKSPACE\scripts\build-release.ps1"

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
